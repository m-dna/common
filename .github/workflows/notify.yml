name: Notify Kakao on Merge

on:
  pull_request:
    types: [closed]

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Send Kakao Message
        run: |
          curl -X POST "https://kapi.kakao.com/v2/api/talk/memo/default/send" \
          -H "Authorization: Bearer ${{ secrets.KAKAO_TOKEN }}" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d 'template_object={
            "object_type":"text",
            "text":"✅ PR Merge 완료!\n제목: ${{ github.event.pull_request.title }}",
            "link":{"web_url":"${{ github.event.pull_request.html_url }}"}
          }'
